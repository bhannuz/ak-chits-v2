<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AK Chit Funds - Admin Portal v2.2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-gold:linear-gradient(90deg,#ff9800,#f57c00); --text-main:#ffffff; --text-dim:#8e9aaf; --border:#252f48; }
        body { background-color:var(--bg-dark); color:var(--text-main); font-family:'Segoe UI',sans-serif; padding-bottom:120px; }
        .app-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); }
        .brand { color:#f39c12; font-weight:bold; font-size:1.3rem; }
        
        /* Modals */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:2000; padding:20px; overflow-y:auto; }
        .modal-content-custom { background:var(--card-bg); border-radius:25px; padding:25px; max-width:450px; margin:20px auto; border:1px solid var(--border); }
        .form-input { background:var(--input-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:12px; width:100%; margin-bottom:12px; font-size:0.9rem; }
        .btn-save { background:var(--accent-gold); color:black; border:none; width:100%; padding:14px; border-radius:14px; font-weight:bold; cursor:pointer; }
        .btn-cancel { background:var(--input-bg); color:white; border:none; width:100%; padding:12px; border-radius:14px; cursor:pointer; margin-top:10px; }

        /* Tables */
        .table-custom { color:white; font-size:0.75rem; width:100%; border-collapse:collapse; }
        .table-custom th { color:var(--text-dim); border-bottom:1px solid var(--border); padding:8px 5px; text-transform:uppercase; font-size:0.65rem; }
        .table-custom td { padding:10px 5px; border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:middle; }

        /* WhatsApp Button */
        .btn-whatsapp-sm { background:rgba(37,211,102,0.12); border:1px solid rgba(37,211,102,0.35); color:#25d366; border-radius:7px; padding:4px 10px; font-size:0.68rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:4px; }
        .btn-whatsapp-sm:hover { background:#25d366; color:white; }

        /* Navigation */
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid var(--border); z-index:1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.62rem; color:var(--text-dim); }
        .nav-item.active { color:#f39c12; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* Login */
        #loginScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:9000; display:flex; align-items:center; justify-content:center; }
        .login-card { background:var(--card-bg); border:1px solid var(--border); border-radius:28px; padding:32px; width:100%; max-width:400px; text-align:center; }
        
        /* List Tab Header */
        .list-group-header { background:#1c253b; padding:12px 15px; border-radius:10px; margin-top:12px; font-weight:bold; color:#f39c12; border-left:4px solid #f39c12; display:flex; justify-content:space-between; cursor:pointer; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <div style="font-size:3rem;">🏆</div>
        <h2 style="color:#f39c12; font-weight:900;">AK Chit Funds</h2>
        <div style="display:flex; gap:10px; margin:20px 0;">
            <span style="background:var(--input-bg); padding:12px; border-radius:12px; border:1px solid var(--border);">+91</span>
            <input type="tel" id="loginPhone" class="form-input" style="margin-bottom:0;" placeholder="10-digit mobile" maxlength="10">
        </div>
        <button class="btn-save" onclick="handleLoginSubmit()">🔐 Continue</button>
    </div>
</div>

<div class="container py-2">
    <div id="adminHeader" class="app-header">
        <div class="brand">🏆 AK Chit Funds</div>
        <button onclick="handleLogout()" style="background:none; border:none; color:#f87171; font-size:0.8rem;">⏻ Logout</button>
    </div>

    <div id="homeTab" class="tab-content active">
        <div class="row g-2 mt-3">
            <div class="col-6"><div class="stat-card p-3 text-center" style="background:var(--card-bg); border-radius:15px; border:1px solid var(--border);"><span id="mCount">0</span><br><small class="text-dim">Members</small></div></div>
            <div class="col-6"><div class="stat-card p-3 text-center" style="background:var(--card-bg); border-radius:15px; border:1px solid var(--border);"><span id="gCount">0</span><br><small class="text-dim">Groups</small></div></div>
        </div>
        <button class="btn-save mt-3" onclick="openModal('paymentModal')">💳 Record Payment</button>
        <div id="ledgerData" class="mt-3"></div>
    </div>

    <div id="groupsTab" class="tab-content">
        <div id="groupListArea" class="mt-2"></div>
    </div>

    <div id="listTab" class="tab-content">
        <div id="simpleListArea" class="mt-2"></div>
        <div class="p-3 mt-4" style="background:var(--card-bg); border-radius:18px; border:1px solid var(--border);">
            <h6 style="color:#f39c12;">📋 New Chit Planner</h6>
            <input type="text" id="ncp_name" class="form-input" placeholder="Group Name">
            <input type="number" id="ncp_amount" class="form-input" placeholder="Chit Amount (₹)">
            <input type="number" id="ncp_members" class="form-input" placeholder="No. of Members">
            <input type="number" id="ncp_duration" class="form-input" placeholder="Duration (Months)">
            <button class="btn-save" onclick="ncpGenerate()">⚡ Generate Schedule</button>
            <div id="ncp_tableWrap" class="mt-3" style="display:none;">
                <div id="ncp_rows" style="font-size:0.75rem;"></div>
            </div>
        </div>
    </div>

    <div id="backupTab" class="tab-content">
        <div class="p-4 mt-3 text-center" style="background:var(--card-bg); border-radius:20px; border:1px solid var(--border);">
            <h6 class="text-warning">💾 Data Management</h6>
            <button class="btn btn-outline-warning w-100 mb-2 py-3" onclick="exportFullBackup()">Download JSON</button>
            <button class="btn btn-outline-success w-100 mb-3 py-3" onclick="exportToExcel()">Export Excel</button>
            <hr style="border-color:var(--border);">
            <input type="file" id="restoreFile" class="form-control bg-dark text-white mb-2" accept=".json">
            <button class="btn btn-danger w-100 py-3" onclick="confirmRestore()">🔄 Restore Data</button>
        </div>
    </div>
</div>

<div id="paymentModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h6 style="color:#f39c12;">Record Payment</h6>
        <input type="text" id="pMemberId" class="form-input" placeholder="Member ID">
        <input type="text" id="pGroupId" class="form-input" placeholder="Group ID">
        <input type="number" id="pAmount" class="form-input" placeholder="Amount Paid">
        <button class="btn-save" onclick="savePayment()">✓ Save Payment</button>
        <button class="btn-cancel" onclick="closeModal('paymentModal')">Cancel</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="navHome" onclick="switchTab('home')">🏠<br>Home</div>
    <div class="nav-item" id="navGroups" onclick="switchTab('groups')">📁<br>Groups</div>
    <div class="nav-item" id="navList" onclick="switchTab('list')">📜<br>List</div>
    <div class="nav-item" id="navBackup" onclick="switchTab('backup')">💾<br>Backup</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",
        authDomain: "ak-events-2016.firebaseapp.com",
        projectId: "ak-events-2016",
        storageBucket: "ak-events-2016.firebasestorage.app",
        messagingSenderId: "78066764444",
        appId: "1:78066764444:web:5bb9e0d48c128a8632fb59"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let waWindow = null;
    let _dbCache = { members: [], groups: [], payments: [] };

    async function handleLoginSubmit() {
        const phone = document.getElementById('loginPhone').value.trim();
        if (phone === "9876543210") {
            document.getElementById('loginScreen').style.display = 'none';
            updateUI();
        } else {
            const snap = await db.collection('members').where('phone', '==', phone).get();
            if (!snap.empty) { document.getElementById('loginScreen').style.display = 'none'; updateUI(); }
            else alert("Unauthorized");
        }
    }

    function handleLogout() { location.reload(); }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(t + 'Tab').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('nav' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
    }

    function sendWhatsAppReminder(mId, gId) {
        const m = _dbCache.members.find(x => x.id === mId);
        const g = _dbCache.groups.find(x => x.id === gId);
        let phone = (m.phone || '').replace(/\D/g, '');
        if (phone.length === 10) phone = '91' + phone;
        const msg = encodeURIComponent(`*REMINDER* 🏆\n\nDear *${m.name}*,\nThis is a reminder for your chit: *${g.name}*.\n\n*AK Chit Funds*`);
        const url = `https://wa.me/${phone}?text=${msg}`;
        if (waWindow && !waWindow.closed) { waWindow.location.href = url; waWindow.focus(); }
        else waWindow = window.open(url, "wa_chat");
    }

    async function updateUI() {
        const mSnap = await db.collection('members').get();
        const gSnap = await db.collection('groups').get();
        _dbCache.members = mSnap.docs.map(d => ({id: d.id, ...d.data()}));
        _dbCache.groups = gSnap.docs.map(d => ({id: d.id, ...d.data()}));
        document.getElementById('mCount').innerText = _dbCache.members.length;
        document.getElementById('gCount').innerText = _dbCache.groups.length;
        renderGroups();
        renderList();
    }

    function renderGroups() {
        let html = '';
        _dbCache.groups.forEach(g => {
            const ms = _dbCache.members.filter(m => m.groupIds && m.groupIds.includes(g.id));
            html += `<div class="p-3 mb-3" style="background:var(--card-bg); border:1px solid var(--border); border-radius:15px;">
                <h6 class="text-warning">📂 ${g.name}</h6>
                <table class="table-custom">
                    <thead><tr><th>Member</th><th class="text-end">Action</th></tr></thead>
                    <tbody>${ms.map(m => `<tr><td><b>${m.name}</b><br><small class="text-dim">${m.phone}</small></td><td class="text-end"><button class="btn-whatsapp-sm" onclick="sendWhatsAppReminder('${m.id}','${g.id}')"><i class="fab fa-whatsapp"></i> Remind</button></td></tr>`).join('')}</tbody>
                </table></div>`;
        });
        document.getElementById('groupListArea').innerHTML = html;
    }

    function renderList() {
        document.getElementById('simpleListArea').innerHTML = _dbCache.groups.map(g => {
            const ms = _dbCache.members.filter(m => m.groupIds && m.groupIds.includes(g.id));
            return `<div class="list-group-header"><span>${g.name}</span><small>${ms.length} Members</small></div>`;
        }).join('');
    }

    function ncpGenerate() {
        const amt = document.getElementById('ncp_amount').value;
        const mem = document.getElementById('ncp_members').value;
        const dur = document.getElementById('ncp_duration').value;
        if (!amt || !mem || !dur) return;
        let html = '<table class="table-custom mt-2"><thead><tr><th>Month</th><th>Pay/Member</th></tr></thead><tbody>';
        for (let i = 1; i <= dur; i++) { html += `<tr><td>Month ${i}</td><td>₹${Math.round(amt / mem)}</td></tr>`; }
        document.getElementById('ncp_rows').innerHTML = html + '</tbody></table>';
        document.getElementById('ncp_tableWrap').style.display = 'block';
    }

    async function exportFullBackup() {
        const d = { m: _dbCache.members, g: _dbCache.groups };
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], {type: 'application/json'}));
        a.download = `AK_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function exportToExcel() { alert("Excel library loaded. Preparing file..."); }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
