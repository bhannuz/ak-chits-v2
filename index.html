<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Split - UPI Ready</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg-dark:#060b19; --sidebar-bg:#0f172a; --card-bg:#1e293b; 
            --accent-blue:#007bff; --text-main:#ffffff; --text-dim:#94a3b8; --border:#334155; 
        }
        body { background-color:var(--bg-dark); color:var(--text-main); font-family:'Segoe UI', sans-serif; margin:0; padding-bottom: 90px; transition: 0.3s; }
        
        .app-header { 
            position: sticky; top: 0; background: var(--sidebar-bg); z-index: 1000;
            padding: 15px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .groups-bar {
            background: var(--bg-dark); padding: 12px; display: flex; 
            overflow-x: auto; gap: 12px; border-bottom: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
        }
        .groups-bar::-webkit-scrollbar { display: none; }
        .group-pill {
            flex: 0 0 auto; padding: 8px 18px; border-radius: 25px;
            background: var(--card-bg); border: 1px solid var(--border);
            font-size: 0.85rem; color: var(--text-dim); cursor: pointer; transition: 0.2s;
        }
        .group-pill.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); font-weight: 600; box-shadow: 0 4px 12px rgba(0,123,255,0.3); }

        .sap-card { 
            background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 12px; 
            border-left: 4px solid #f39c12; display: flex; justify-content: space-between; align-items: center;
        }
        .balance-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 20px; padding: 20px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
            background: var(--sidebar-bg); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: 10px;
        }
        .nav-item { text-align: center; color: var(--text-dim); text-decoration: none; font-size: 0.7rem; flex: 1; border: none; background: none; transition: 0.2s; }
        .nav-item.active { color: var(--accent-blue); font-weight: 700; }
        .nav-icon { font-size: 1.5rem; display: block; margin-bottom: 2px; }

        .btn-upi { background: #10b981; color: white; border: none; border-radius: 6px; padding: 4px 12px; font-size: 0.75rem; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-upi:hover { background: #059669; color: white; }

        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; padding:20px; overflow-y:auto; }
        .modal-content-custom { background:var(--sidebar-bg); border-radius:20px; padding:25px; max-width:500px; margin:auto; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-input { background:var(--bg-dark); border:1px solid var(--border); color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:15px; }
        
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .participant-chip { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-bottom:5px; cursor:pointer; }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-size: 1.2rem; font-weight: 900; color: #f39c12; letter-spacing: 0.5px;">💸 SMART SPLIT</div>
    <div class="d-flex align-items-center gap-3">
        <button onclick="toggleTheme()" style="background:none; border:none; font-size:1.1rem;" id="themeIcon">🌙</button>
        <div style="font-size:0.6rem; color:#10b981; border:1px solid #10b981; padding:2px 10px; border-radius:50px; font-weight: bold;">UPI LIVE</div>
    </div>
</div>

<div class="groups-bar" id="sidebarGroups"></div>

<div class="container py-3">
    <div id="activityView" class="tab-content active">
        <div class="balance-card">
            <div style="height: 140px; margin-bottom: 10px;"><canvas id="categoryChart"></canvas></div>
            <div style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Trip Total</div>
            <div id="totalSpent" style="font-size: 2rem; font-weight: 800;">₹0</div>
        </div>
        
        <div class="d-flex gap-2 mb-4">
            <input type="text" id="expenseSearch" class="form-control" style="background:var(--card-bg); color:white; border:1px solid var(--border); border-radius: 10px;" placeholder="Search topic..." oninput="renderExpenses()">
            <button class="btn" style="background:#f39c12; border:none; color:black; font-weight:800; border-radius: 10px; padding: 0 20px;" onclick="prepareNewExpense()">+ ADD</button>
        </div>
        
        <div id="expenseList"></div>
    </div>

    <div id="membersView" class="tab-content">
        <div class="balance-card" style="border-color: var(--accent-blue); text-align: left; padding: 15px;">
            <h6 style="font-size: 0.65rem; color: var(--accent-blue); letter-spacing: 1px; margin-bottom: 12px; font-weight: 800;">PENDING SETTLEMENTS</h6>
            <div id="settlementSummary" style="font-size: 0.85rem;">Select a group to see who owes whom.</div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 style="font-weight:800; margin:0;">Group Members</h5>
            <button class="btn btn-sm btn-primary" style="border-radius: 8px;" onclick="openAddMemberModal()">+ Add Person</button>
        </div>
        <div id="memberListArea"></div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('activity')" id="nav-activity"><span class="nav-icon">🕒</span>Activity</button>
    <button class="nav-item" onclick="switchTab('members')" id="nav-members"><span class="nav-icon">👥</span>Members</button>
    <button class="nav-item" onclick="openModal('groupModal')"><span class="nav-icon">✈️</span>New Trip</button>
</nav>

<div id="expenseModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5 id="modalTitle" style="font-weight: 800; margin-bottom: 20px;">Expense Detail</h5>
        <input type="hidden" id="editExpId">
        <select id="expCategory" class="form-input">
            <option value="🍛 Food">🍛 Food</option><option value="⛽ Petrol">⛽ Petrol</option>
            <option value="🚗 Travel">🚗 Travel</option><option value="🏠 Stay">🏠 Stay</option>
            <option value="⚙️ Misc">⚙️ Misc</option>
        </select>
        <input type="text" id="expDesc" class="form-input" placeholder="What for?">
        <input type="number" id="expAmount" class="form-input" placeholder="Amount (₹)">
        <label class="small text-dim mb-1">Paid By</label>
        <select id="expPayer" class="form-input"></select>
        <label class="small text-dim mb-1">Split Between</label>
        <div id="participantList" style="max-height: 150px; overflow-y: auto; margin-bottom: 20px; border:1px solid var(--border); padding:10px; border-radius:10px;"></div>
        <button class="btn btn-primary w-100 py-3 fw-bold" onclick="saveExpense()">CONFIRM</button>
        <button class="btn btn-link w-100 text-dim mt-2" onclick="closeModal('expenseModal')">Cancel</button>
    </div>
</div>

<div id="groupModal" class="modal-overlay"><div class="modal-content-custom">
    <h5 style="font-weight: 800;">New Trip Group</h5>
    <input type="text" id="groupName" class="form-input" placeholder="Trip Name">
    <button class="btn btn-primary w-100 py-3 fw-bold" onclick="saveGroup()">CREATE TRIP</button>
    <button class="btn btn-link w-100 text-dim mt-2" onclick="closeModal('groupModal')">Cancel</button>
</div></div>

<div id="memberModal" class="modal-overlay"><div class="modal-content-custom">
    <h5 style="font-weight: 800;">Add Member</h5>
    <input type="text" id="memName" class="form-input" placeholder="Full Name">
    <input type="text" id="memUPI" class="form-input" placeholder="UPI ID (e.g. user@upi)">
    <button class="btn btn-primary w-100 py-3 fw-bold" onclick="saveMember()">SAVE MEMBER</button>
    <button class="btn btn-link w-100 text-dim mt-2" onclick="closeModal('memberModal')">Cancel</button>
</div></div>

<script>
const firebaseConfig = { apiKey: "AIzaSyB9_sBL83skvIaOVAE8msHwIWq8QQwhxFU", projectId: "ak-chit-funds", authDomain: "ak-chit-funds.firebaseapp.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let MEMBERS = []; let EXPENSES = []; let GROUPS = [];
let activeGroupId = localStorage.getItem('activeGroupId') || null;
let categoryChart = null;

function startApp() {
    db.collection('groups').onSnapshot(snap => {
        GROUPS = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        if (!activeGroupId && GROUPS.length > 0) setActiveGroup(GROUPS[0].id);
        renderGroups();
    });
    db.collection('members').onSnapshot(snap => {
        MEMBERS = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        renderMembers(); updatePayerDropdown(); renderParticipantsChecklist();
    });
    db.collection('expenses').orderBy('timestamp', 'desc').onSnapshot(snap => {
        EXPENSES = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        renderExpenses(); calculateDebts();
    });
}

function setActiveGroup(id) { activeGroupId = id; localStorage.setItem('activeGroupId', id); renderGroups(); renderExpenses(); calculateDebts(); renderMembers(); updatePayerDropdown(); renderParticipantsChecklist(); }

function renderGroups() {
    const list = document.getElementById('sidebarGroups');
    list.innerHTML = GROUPS.map(g => `<div class="group-pill ${activeGroupId === g.id ? 'active' : ''}" onclick="setActiveGroup('${g.id}')">${g.name}</div>`).join('');
}

function renderExpenses() {
    const list = document.getElementById('expenseList');
    const search = document.getElementById('expenseSearch').value.toLowerCase();
    let total = 0;
    const filtered = EXPENSES.filter(e => e.groupId === activeGroupId && e.description.toLowerCase().includes(search));

    list.innerHTML = filtered.map(exp => {
        if(exp.type !== 'settlement') total += parseFloat(exp.amount || 0);
        return `<div class="sap-card">
            <div style="min-width:0; flex:1; margin-right:10px;">
                <div style="font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${exp.description}</div>
                <div style="font-size:0.7rem; color:var(--text-dim);">${exp.payerName} • ${exp.category || 'Misc'}</div>
            </div>
            <div style="text-align:right;">
                <div style="font-weight:800; font-size:1rem;">₹${exp.amount}</div>
                <div class="mt-1 d-flex gap-3 justify-content-end"><span onclick="editExpense('${exp.id}')">✏️</span><span onclick="deleteExpense('${exp.id}')">🗑️</span></div>
            </div>
        </div>`;
    }).join('');
    document.getElementById('totalSpent').innerText = '₹' + total.toLocaleString('en-IN');
    updateChart(EXPENSES.filter(e => e.groupId === activeGroupId));
}

function updateChart(groupData) {
    const ctx = document.getElementById('categoryChart').getContext('2d');
    const totals = {};
    groupData.forEach(e => { if(e.type !== 'settlement') totals[e.category || '⚙️ Misc'] = (totals[e.category] || 0) + parseFloat(e.amount); });
    if (categoryChart) categoryChart.destroy();
    if(Object.keys(totals).length === 0) return;
    categoryChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: Object.keys(totals), datasets: [{ data: Object.values(totals), backgroundColor: ['#3b82f6','#10b981','#f39c12','#ef4444','#8b5cf6'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } }
    });
}

function calculateDebts() {
    const gExp = EXPENSES.filter(e => e.groupId === activeGroupId);
    const gMem = MEMBERS.filter(m => m.groupId === activeGroupId);
    if (gMem.length < 2) return document.getElementById('settlementSummary').innerText = "Add members first.";
    let bal = {}; gMem.forEach(m => bal[m.id] = 0);
    gExp.forEach(exp => {
        const amt = parseFloat(exp.amount);
        const parts = exp.participants || gMem.map(m=>m.id);
        const share = amt / parts.length;
        if(bal[exp.payerId] !== undefined) bal[exp.payerId] += amt;
        parts.forEach(pId => { if(bal[pId] !== undefined) bal[pId] -= share; });
    });
    let html = []; let temp = {...bal};
    let debtors = gMem.filter(m => temp[m.id] < -1).sort((a,b) => temp[a.id] - temp[b.id]);
    let creditors = gMem.filter(m => temp[m.id] > 1).sort((a,b) => temp[b.id] - temp[a.id]);
    debtors.forEach(d => {
        creditors.forEach(c => {
            let owed = Math.min(Math.abs(temp[d.id]), temp[c.id]);
            if (owed > 1) {
                const upi = c.upi ? `upi://pay?pa=${c.upi}&pn=${encodeURIComponent(c.name)}&am=${owed.toFixed(2)}&cu=INR` : null;
                html.push(`<div class="sap-card" style="border-left-color:#ef4444; padding:12px; margin-bottom:8px;">
                    <div style="font-size:0.8rem; flex:1;"><b>${d.name}</b> owes <b>${c.name}</b></div>
                    <div class="d-flex align-items-center gap-2">
                        <b class="text-danger">₹${owed.toFixed(0)}</b>
                        ${upi ? `<a href="${upi}" class="btn-upi">PAY</a>` : ''}
                        <button class="btn btn-sm btn-success py-1 px-2" style="font-size:0.6rem; font-weight:800;" onclick="settleDebt('${d.id}','${d.name}','${c.id}','${c.name}',${owed})">SETTLE</button>
                    </div>
                </div>`);
                temp[d.id] += owed; temp[c.id] -= owed;
            }
        });
    });
    document.getElementById('settlementSummary').innerHTML = html.length ? html.join('') : "✅ Trip is settled!";
}

async function saveExpense() {
    const id = document.getElementById('editExpId').value;
    const parts = Array.from(document.querySelectorAll('.split-cb:checked')).map(cb => cb.value);
    const pId = document.getElementById('expPayer').value;
    const amt = parseFloat(document.getElementById('expAmount').value);
    const desc = document.getElementById('expDesc').value;
    if(!activeGroupId || parts.length === 0 || !pId || !desc || isNaN(amt)) return alert("Fill all fields!");
    const data = { groupId: activeGroupId, description: desc, amount: amt, category: document.getElementById('expCategory').value, payerId: pId, payerName: MEMBERS.find(m => m.id === pId)?.name, participants: parts, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
    if(id) await db.collection('expenses').doc(id).update(data);
    else await db.collection('expenses').add(data);
    closeModal('expenseModal');
}

async function saveMember() {
    const n = document.getElementById('memName').value.trim();
    const u = document.getElementById('memUPI').value.trim();
    if(n && activeGroupId) await db.collection('members').add({name: n, upi: u, groupId: activeGroupId});
    closeModal('memberModal');
}

async function saveGroup() {
    const n = document.getElementById('groupName').value.trim();
    if(n) { const doc = await db.collection('groups').add({name: n}); setActiveGroup(doc.id); }
    closeModal('groupModal');
}

function editExpense(id) {
    const exp = EXPENSES.find(e => e.id === id);
    if(!exp) return;
    document.getElementById('modalTitle').innerText = "Edit Expense";
    document.getElementById('editExpId').value = id;
    document.getElementById('expDesc').value = exp.description;
    document.getElementById('expAmount').value = exp.amount;
    document.getElementById('expCategory').value = exp.category || "⚙️ Misc";
    document.getElementById('expPayer').value = exp.payerId;
    renderParticipantsChecklist(exp.participants || []);
    openModal('expenseModal');
}

function renderMembers() { document.getElementById('memberListArea').innerHTML = MEMBERS.filter(m => m.groupId === activeGroupId).map(m => `<div class="sap-card" style="border-left-color:#3b82f6;"><div><b>${m.name}</b><br><small class="text-dim">${m.upi || 'No UPI'}</small></div><button class="btn btn-sm text-danger" onclick="deleteMember('${m.id}')">✕</button></div>`).join('') || '<div class="text-dim text-center">No members yet.</div>'; }
function updatePayerDropdown() { document.getElementById('expPayer').innerHTML = MEMBERS.filter(m => m.groupId === activeGroupId).map(m => `<option value="${m.id}">${m.name}</option>`).join(''); }
function renderParticipantsChecklist(selected = []) { document.getElementById('participantList').innerHTML = MEMBERS.filter(m => m.groupId === activeGroupId).map(m => `<label class="participant-chip"><input type="checkbox" value="${m.id}" class="split-cb" ${selected.length === 0 || selected.includes(m.id) ? 'checked' : ''}> ${m.name}</label>`).join(''); }
async function settleDebt(fId, fName, tId, tName, amt) { if(confirm("Mark as settled?")) await db.collection('expenses').add({ groupId: activeGroupId, description: `Settlement: ${fName} to ${tName}`, amount: amt, payerId: fId, payerName: fName, participants: [tId], type: 'settlement', timestamp: firebase.firestore.FieldValue.serverTimestamp() }); }
async function deleteExpense(id) { if(confirm("Delete?")) await db.collection('expenses').doc(id).delete(); }
async function deleteMember(id) { if(confirm("Remove?")) await db.collection('members').doc(id).delete(); }
function openModal(id) { document.getElementById(id).style.display = 'block'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function switchTab(t) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById(t + 'View').classList.add('active'); document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active')); document.getElementById('nav-' + t).classList.add('active'); }
function prepareNewExpense() { if(!activeGroupId) return alert("Select group!"); openModal('expenseModal'); }
function openAddMemberModal() { if(!activeGroupId) return alert("Select group!"); openModal('memberModal'); }
function toggleTheme() {
    const r = document.documentElement;
    const isDark = getComputedStyle(r).getPropertyValue('--bg-dark').trim() === '#060b19';
    if(isDark) {
        r.style.setProperty('--bg-dark', '#f8fafc'); r.style.setProperty('--sidebar-bg', '#ffffff');
        r.style.setProperty('--card-bg', '#f1f5f9'); r.style.setProperty('--text-main', '#0f172a');
        r.style.setProperty('--text-dim', '#64748b'); r.style.setProperty('--border', '#e2e8f0');
        document.getElementById('themeIcon').innerText = '☀️';
    } else {
        r.style.setProperty('--bg-dark', '#060b19'); r.style.setProperty('--sidebar-bg', '#0f172a');
        r.style.setProperty('--card-bg', '#1e293b'); r.style.setProperty('--text-main', '#ffffff');
        r.style.setProperty('--text-dim', '#94a3b8'); r.style.setProperty('--border', '#334155');
        document.getElementById('themeIcon').innerText = '🌙';
    }
}
document.addEventListener('DOMContentLoaded', startApp);
</script>
</body>
</html>
