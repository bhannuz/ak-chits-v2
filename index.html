<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AK Chit Funds - Admin Portal v2.7</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-gold:linear-gradient(90deg,#ff9800,#f57c00); --text-main:#ffffff; --text-dim:#8e9aaf; --border:#252f48; }
        body { background-color:var(--bg-dark); color:var(--text-main); font-family:'Segoe UI',sans-serif; padding-bottom:120px; }
        
        /* DOUBLED LOGO SIZE */
        .brand { display:flex; align-items:center; gap:15px; color:#f39c12; font-weight:bold; font-size:1.6rem; }
        .brand-logo { font-size:3.5rem !important; line-height: 1; }

        .app-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid var(--border); z-index:1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.62rem; color:var(--text-dim); }
        .nav-item.active { color:#f39c12; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        .table-custom { color:white; font-size:0.75rem; width:100%; border-collapse:collapse; }
        .table-custom th { color:var(--text-dim); border-bottom:1px solid var(--border); padding:8px 5px; text-transform:uppercase; font-size:0.65rem; }
        .table-custom td { padding:10px 5px; border-bottom:1px solid rgba(255,255,255,0.05); }

        /* PROFESSIONAL PRINT OVERRIDES (BLACK FONT) */
        #printOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:99999; overflow-y:auto; padding:24px; color: black !important; display:none; }
        @media print {
            body > *:not(#printOverlay) { display:none !important; }
            #printOverlay { position:absolute; top:0; left:0; width:100%; display:block !important; }
            #printOverlay table, #printOverlay td, #printOverlay th, #printOverlay h1, #printOverlay p, #printOverlay b { 
                color: black !important; 
                border-color: #000 !important; 
            }
            .no-print-col, .no-print { display: none !important; }
        }

        .btn-whatsapp-sm { background:rgba(37,211,102,0.12); border:1px solid rgba(37,211,102,0.35); color:#25d366; border-radius:7px; padding:6px 12px; font-size:0.75rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
        .btn-save { background:var(--accent-gold); color:black; border:none; width:100%; padding:14px; border-radius:14px; font-weight:bold; cursor:pointer; }
        .form-input { background:var(--input-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:12px; width:100%; margin-bottom:12px; font-size:0.9rem; }
    </style>
</head>
<body>
<div id="loginScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:9000; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--card-bg); border:1px solid var(--border); border-radius:28px; padding:32px; width:100%; max-width:400px; text-align:center;">
        <div class="brand-logo">🏆</div>
        <h2 style="color:#f39c12; font-weight:900;">AK Chit Funds</h2>
        <input type="tel" id="loginPhone" class="form-input mt-4" placeholder="10-digit mobile" maxlength="10">
        <button class="btn-save" onclick="handleLoginSubmit()">🔐 Continue</button>
    </div>
</div>

<div class="container py-2">
    <div class="app-header">
        <div class="brand"><div class="brand-logo">🏆</div><span>AK CHIT FUNDS</span></div>
        <button onclick="handleLogout()" style="background:none; border:none; color:#f87171; font-size:0.8rem;">⏻ Logout</button>
    </div>

    <div id="homeTab" class="tab-content active">
        <div class="row g-2 mt-3 text-center">
            <div class="col-6"><div style="background:var(--card-bg); border-radius:15px; border:1px solid var(--border); padding:15px;"><span id="mCount" style="font-weight:bold; font-size:1.2rem;">0</span><br><small style="color:var(--text-dim);">Members</small></div></div>
            <div class="col-6"><div style="background:var(--card-bg); border-radius:15px; border:1px solid var(--border); padding:15px;"><span id="gCount" style="font-weight:bold; font-size:1.2rem;">0</span><br><small style="color:var(--text-dim);">Groups</small></div></div>
        </div>
        <button class="btn-save mt-3" onclick="alert('Record Payment feature in Home Tab.')">💳 Record Payment</button>
        <div id="ledgerData" class="mt-4"></div>
    </div>

    <div id="groupsTab" class="tab-content">
        <div id="groupListArea" class="mt-2"></div>
    </div>

    <div id="listTab" class="tab-content">
        <div class="p-3 mt-4" style="background:var(--card-bg); border:1px solid var(--border); border-radius:18px;">
            <h6 style="color:#f39c12; margin-bottom: 15px;">📋 Chit Planner</h6>
            <div class="row g-2">
                <input type="text" id="ncp_name" class="form-input" placeholder="Group Name">
                <input type="number" id="ncp_amount" class="form-input" placeholder="Chit Amount">
                <input type="number" id="ncp_members" class="form-input" placeholder="Members">
                <input type="number" id="ncp_duration" class="form-input" placeholder="Months">
                <input type="text" id="ncp_upi_id" class="form-input" placeholder="Your UPI ID (e.g. 8121723153@ybl)">
            </div>
            <button class="btn-save" onclick="ncpGenerate()">⚡ Generate Schedule</button>
            <div id="ncp_tableWrap" style="display:none;" class="mt-3">
                <div id="ncp_rows"></div>
                <button class="btn-save mt-2" onclick="ncpPrint()">🖨️ Print Schedule</button>
            </div>
        </div>
    </div>
</div>
<div id="printOverlay"></div>
<div class="nav-bar">
    <div class="nav-item active" id="navHome" onclick="switchTab('home')">🏠<br>Home</div>
    <div class="nav-item" id="navGroups" onclick="switchTab('groups')">📁<br>Groups</div>
    <div class="nav-item" id="navList" onclick="switchTab('list')">📜<br>List</div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016", storageBucket: "ak-events-2016.firebasestorage.app", messagingSenderId: "78066764444", appId: "1:78066764444:web:5bb9e0d48c128a8632fb59" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let _dbCache = { members: [], groups: [] };
    let waWindow = null;

    async function handleLoginSubmit() {
        const phone = document.getElementById('loginPhone').value.trim();
        if (phone === "9876543210") { document.getElementById('loginScreen').style.display = 'none'; updateUI(); }
        else { alert("Admin Access Required"); }
    }

    async function updateUI() {
        const mSnap = await db.collection('members').get();
        const gSnap = await db.collection('groups').get();
        _dbCache.members = mSnap.docs.map(d => ({id: d.id, ...d.data()}));
        _dbCache.groups = gSnap.docs.map(d => ({id: d.id, ...d.data()}));
        document.getElementById('mCount').innerText = _dbCache.members.length;
        document.getElementById('gCount').innerText = _dbCache.groups.length;
        renderGroups();
    }

    function renderGroups() {
        let html = '';
        _dbCache.groups.forEach(g => {
            const ms = _dbCache.members.filter(m => m.groupIds && m.groupIds.includes(g.id));
            html += `<div class="p-3 mb-3" style="background:var(--card-bg); border:1px solid var(--border); border-radius:15px;">
                <h6 class="text-warning">📂 ${g.name}</h6>
                <table class="table-custom">
                    <thead><tr><th>Member</th><th class="text-end">Action</th></tr></thead>
                    <tbody>${ms.map(m => `<tr><td><b>${m.name}</b><br><small>${m.phone}</small></td><td class="text-end"><button class="btn-whatsapp-sm" onclick="sendWhatsAppReminder('${m.id}','${g.id}')"><i class="fab fa-whatsapp"></i></button></td></tr>`).join('')}</tbody>
                </table></div>`;
        });
        document.getElementById('groupListArea').innerHTML = html;
    }

    function sendWhatsAppReminder(mId, gId) {
        const m = _dbCache.members.find(x => x.id === mId);
        const g = _dbCache.groups.find(x => x.id === gId);
        const upiId = document.getElementById('ncp_upi_id').value || "8121723153@ybl";
        const monthlyPay = Math.round(parseFloat(document.getElementById('ncp_amount').value || 0) / parseInt(document.getElementById('ncp_members').value || 1));
        
        // UPI Deep Link Integration
        const upiDeepLink = `upi://pay?pa=${upiId}&pn=AK%20Chit%20Funds&am=${monthlyPay}&cu=INR`;
        const phone = '91' + m.phone.replace(/\D/g, '').slice(-10);
        const msg = encodeURIComponent(`*PAYMENT REMINDER* 🏆\n\nDear *${m.name}*,\n\nReminder for contribution of *₹${monthlyPay}* in *${g.name}*.\n\n📲 *Pay Now via UPI:*\n${upiDeepLink}\n\n*AK Chit Funds*`);
        const url = `https://wa.me/${phone}?text=${msg}`;
        
        if (waWindow && !waWindow.closed) { waWindow.location.href = url; waWindow.focus(); }
        else { waWindow = window.open(url, "wa_chat"); }
    }

    function ncpGenerate() {
        const amt = parseFloat(document.getElementById('ncp_amount').value);
        const mems = parseInt(document.getElementById('ncp_members').value);
        const dur = parseInt(document.getElementById('ncp_duration').value);
        if (!amt || !mems || !dur) return;
        let html = '<table class="table-custom mt-2"><thead><tr><th>#</th><th>Pay/Member</th><th>Payout</th><th class="no-print-col">Payout %</th></tr></thead><tbody>';
        const monthlyPay = Math.round(amt / mems);
        for (let i = 1; i <= dur; i++) {
            html += `<tr><td>${i}</td><td>₹${monthlyPay}</td><td>₹${amt - (amt * 0.05)}</td><td class="no-print-col">95%</td></tr>`;
        }
        document.getElementById('ncp_rows').innerHTML = html + '</tbody></table>';
        document.getElementById('ncp_tableWrap').style.display = 'block';
    }

    function ncpPrint() {
        const name = document.getElementById('ncp_name').value || "Chit Schedule";
        const rows = document.getElementById('ncp_rows').innerHTML;
        const upi = document.getElementById('ncp_upi_id').value || "8121723153@ybl";
        const overlay = document.getElementById('printOverlay');
        overlay.innerHTML = `
            <div class="no-print" style="margin-bottom:20px; text-align: right;">
                 <button onclick="window.print()" class="btn-save" style="width: 150px;">🖨️ Print Now</button>
                 <button onclick="document.getElementById('printOverlay').style.display='none'" class="btn-cancel" style="padding: 10px 20px; border-radius: 10px; margin-left: 10px; background:#ddd; color:black; border:none;">Close</button>
            </div>
            <div style="text-align:center; border-bottom:2px solid black; padding-bottom:10px;">
                <h1 style="margin:0; font-size: 2.5rem; color:black !important;">🏆 AK CHIT FUNDS</h1>
                <p style="margin:5px 0; font-size: 1.2rem; color:black !important;">Official Payment Schedule: <b>${name}</b></p>
            </div>
            <div style="margin-top:20px;">${rows.replace(/<th class="no-print-col">.*?<\/th>/g, '').replace(/<td class="no-print-col">.*?<\/td>/g, '')}</div>
            <div style="margin-top:30px; border:2px solid black; padding:15px; border-radius:10px; color:black !important;">
                <p style="margin:0; text-transform: uppercase; font-size: 0.9rem;"><b>Payment Instructions:</b></p>
                <p style="font-size:1.4rem; margin:10px 0;">UPI ID: <b>${upi}</b></p>
            </div>`;
        overlay.style.display = 'block';
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(t + 'Tab').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('nav' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
    }
    
    function handleLogout() { location.reload(); }
</script>
</body>
</html>
